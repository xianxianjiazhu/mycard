<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyCard 簡訊整理工具</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;background:#f0f2f8;min-height:100vh;padding:24px 16px;color:#1e2533}
.container{max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
.card{background:#fff;border-radius:16px;padding:28px 28px 24px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
h1{font-size:22px;font-weight:700;color:#1e2533;margin-bottom:8px}
.desc{font-size:13px;color:#6b7280;line-height:1.6}
.section-title{font-size:14px;font-weight:600;color:#374151;margin-bottom:10px}
textarea{width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:12px 14px;font-size:13px;font-family:inherit;color:#374151;resize:vertical;outline:none;min-height:160px;line-height:1.7;background:#fafafa;transition:border-color .15s}
textarea:focus{border-color:#3b82f6;background:#fff}
textarea::placeholder{color:#9ca3af}
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.btn{padding:11px 16px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
.btn:active{transform:scale(0.98)}
.btn-primary{background:#3b82f6;color:#fff}
.btn-primary:hover{background:#2563eb}
.btn-secondary{background:#f1f5ff;color:#3b82f6;border:1.5px solid #dbeafe}
.btn-secondary:hover{background:#dbeafe}
.btn-danger{background:#fff1f2;color:#ef4444;border:1.5px solid #fecaca}
.btn-danger:hover{background:#fee2e2}
.btn-neutral{background:#f3f4f6;color:#374151;border:1.5px solid #e5e7eb}
.btn-neutral:hover{background:#e5e7eb}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:8px}
.btn-dark{background:#1e3a8a;color:#fff;border:none}
.btn-dark:hover{background:#1e40af}
.btn-outline{background:#fff;color:#1e3a8a;border:1.5px solid #bfdbfe}
.btn-outline:hover{background:#eff6ff}
.btn-gray-sm{background:#f3f4f6;color:#374151;border:1.5px solid #e5e7eb}
.btn-gray-sm:hover{background:#e5e7eb}
.hint{font-size:12px;color:#9ca3af;margin-top:12px}
.hint span{color:#6b7280}
.row{display:flex;gap:12px;align-items:flex-start}
.row>*{flex:1}
label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px}
select,input[type=text]{width:100%;padding:9px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:13px;font-family:inherit;color:#374151;background:#fff;outline:none;transition:border-color .15s}
select:focus,input[type=text]:focus{border-color:#3b82f6}
.output-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.count-label{font-size:14px;font-weight:600;color:#374151}
.action-btns{display:flex;gap:8px}
.preview-textarea{min-height:100px;font-family:'Menlo','Courier New',monospace;font-size:12px;background:#f9fafb}
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.fmt-badge{font-size:12px;color:#6b7280;background:#f3f4f6;border:1px solid #e5e7eb;border-radius:20px;padding:4px 12px}
.empty-msg{font-size:13px;color:#9ca3af;text-align:center;padding:16px 0}

/* Result cards */
.result-card{border:1px solid #e8eaf0;border-radius:14px;margin-bottom:14px;background:#fff;overflow:hidden}
.result-card:last-child{margin-bottom:0}
.result-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 10px}
.entry-num{font-size:15px;font-weight:700;color:#1e2533}
.head-copy-btn{font-size:12px;padding:5px 14px;border:1px solid #e5e7eb;border-radius:20px;background:#fff;color:#374151;cursor:pointer;font-family:inherit;transition:background .1s}
.head-copy-btn:hover{background:#f3f4f6}
.result-body{padding:0 20px 20px}
.rc-label{font-size:13px;color:#6b7280;margin-bottom:6px;margin-top:14px}
.rc-field{width:100%;background:#f3f4f6;border:none;border-radius:8px;padding:13px 14px;font-size:14px;font-family:'Menlo','Courier New',monospace;color:#1e2533;outline:none;cursor:default}
.copy-btns{display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px;margin-top:18px}
.cb{padding:13px 8px;font-size:14px;font-weight:600;border-radius:10px;cursor:pointer;font-family:inherit;border:none;transition:all .15s;text-align:center}
.cb:active{transform:scale(0.97)}
.cb-blue{background:#3b82f6;color:#fff}
.cb-blue:hover{background:#2563eb}
.cb-light{background:#f0f4ff;color:#3b82f6;border:1px solid #dbeafe}
.cb-light:hover{background:#dbeafe}
.cb-gray{background:#f3f4f6;color:#374151;border:1px solid #e5e7eb}
.cb-gray:hover{background:#e5e7eb}
.copied-state{background:#dcfce7!important;color:#16a34a!important;border-color:#bbf7d0!important}

@media(max-width:520px){
  .row{flex-direction:column}
  .copy-btns{grid-template-columns:1fr 1fr 1fr}
  .action-btns .btn-sm span{display:none}
}
</style>
</head>
<body>
<div class="container">

  <div class="card">
    <h1>MyCard 簡訊整理工具</h1>
    <p class="desc">純前端工具，不會把資料送到伺服器。把 momo 簡訊整段貼進來，就能自動拆出卡號與密碼，並支援單筆複製、全部複製與不同輸出格式。</p>
  </div>

  <div class="card">
    <div class="section-title">貼上簡訊內容</div>
    <textarea id="sms-input" placeholder="例如：您於momo購買的商品卡號為：XXXXXX000000，商品密碼為ASDFGHJKLZXC，商品名稱【MyCard】90點點數卡 ..."></textarea>
    <div class="btn-grid">
      <button class="btn btn-primary" onclick="parse()">解析資料</button>
      <button class="btn btn-neutral" onclick="pasteClipboard()">貼上剪貼簿</button>
      <button class="btn btn-secondary" onclick="loadExample()">載入範例</button>
      <button class="btn btn-danger" onclick="clearAll()">清空</button>
    </div>
    <p class="hint">支援格式：您於momo購買的商品<span>卡號為：卡號</span>，商品<span>密碼為密碼</span>，商品名稱【MyCard】90點點數卡</p>
  </div>

  <div class="card">
    <div class="row">
      <div>
        <label for="fmt-sel">輸出格式</label>
        <select id="fmt-sel" onchange="updateOutput()">
          <option value="card,pwd">卡號,密碼</option>
          <option value="pwd,card">密碼,卡號</option>
          <option value="card">僅卡號</option>
          <option value="pwd">僅密碼</option>
          <option value="card|pwd">卡號|密碼</option>
          <option value="card pwd">卡號 密碼</option>
        </select>
      </div>
      <div>
        <label for="custom-sep">自訂分隔符（選填）</label>
        <input type="text" id="custom-sep" placeholder="例如：/ 或 #" oninput="updateOutput()">
      </div>
    </div>
    <div style="margin-top:16px">
      <div class="output-bar">
        <span class="count-label" id="count-label">共 0 筆</span>
        <div class="action-btns">
          <button class="btn btn-sm btn-dark"     onclick="copyAll(this)"><span>全部複製</span></button>
          <button class="btn btn-sm btn-outline"  onclick="copyFirst(this)"><span>複製第一筆</span></button>
          <button class="btn btn-sm btn-gray-sm"  onclick="downloadTxt()"><span>下載 TXT</span></button>
        </div>
      </div>
      <label>全部輸出預覽</label>
      <textarea class="preview-textarea" id="all-preview" readonly placeholder="解析後將在此顯示輸出內容..."></textarea>
      <p class="hint">提示：在 iPhone 可用 Safari 開啟後「分享 → 加到主畫面」；在 Android 可用 Chrome「加入主畫面」，之後就會像 App 一樣好按。</p>
    </div>
  </div>

  <div class="card">
    <div class="results-header">
      <div class="section-title" style="margin-bottom:0">解析結果</div>
      <span class="fmt-badge" id="fmt-badge">目前格式：卡號,密碼</span>
    </div>
    <div id="results"><p class="empty-msg">目前沒有資料。</p></div>
  </div>

</div>
<script>
let items = [];

const EXAMPLE = '您於momo購買的商品卡號為:MYCARD123456，商品密碼為PASS789ABC，商品名稱【MyCard】90點點數卡 您於momo購買的商品卡號為:MYCARD654321，商品密碼為PASS321XYZ，商品名稱【MyCard】300點點數卡 您於momo購買的商品卡號為:MYCARD999888，商品密碼為PASSABC000，商品名稱【MyCard】500點點數卡';

function extract(text) {
  const cardRe = /(?:卡號為\s*[:：]\s*|卡號\s*[:：]\s*)([A-Za-z0-9\-]+)/;
  const pwRe   = /(?:密碼為\s*[:：]?\s*|密碼\s*[:：]\s*)([A-Za-z0-9\-]+)/;
  const cm = text.match(cardRe), pm = text.match(pwRe);
  return { card: cm ? cm[1] : '', pwd: pm ? pm[1] : '' };
}

function splitMessages(raw) {
  const normalized = raw.replace(/[\s]+(?=您於|您好|親愛的|【MyCard|【my)/gi, '\n');
  return normalized.split(/\n+/).map(s => s.trim()).filter(Boolean);
}

function getFormat(it) {
  const sep = document.getElementById('custom-sep').value.trim();
  const fmt = document.getElementById('fmt-sel').value;
  if (fmt === 'card')     return it.card;
  if (fmt === 'pwd')      return it.pwd;
  if (fmt === 'card,pwd') return it.card + (sep || ',') + it.pwd;
  if (fmt === 'pwd,card') return it.pwd + (sep || ',') + it.card;
  if (fmt === 'card|pwd') return it.card + (sep || '|') + it.pwd;
  if (fmt === 'card pwd') return it.card + (sep || ' ') + it.pwd;
  return it.card + ',' + it.pwd;
}

function getFmtLabel() {
  const map = {'card,pwd':'卡號,密碼','pwd,card':'密碼,卡號','card':'僅卡號','pwd':'僅密碼','card|pwd':'卡號|密碼','card pwd':'卡號 密碼'};
  return map[document.getElementById('fmt-sel').value] || '';
}

function updateOutput() {
  document.getElementById('fmt-badge').textContent = '目前格式：' + getFmtLabel();
  document.getElementById('all-preview').value = items.map(it => getFormat(it)).join('\n');
  document.getElementById('count-label').textContent = '共 ' + items.length + ' 筆';
  renderCards();
}

function renderCards() {
  const res = document.getElementById('results');
  if (!items.length) { res.innerHTML = '<p class="empty-msg">目前沒有資料。</p>'; return; }
  res.innerHTML = items.map(function(it, i) {
    const out = getFormat(it);
    return '<div class="result-card">'
      + '<div class="result-head">'
      + '<span class="entry-num">第 ' + (i+1) + ' 筆</span>'
      + '<button class="head-copy-btn" onclick="doCopy(this,\'' + esc(out) + '\')">可單筆複製</button>'
      + '</div>'
      + '<div class="result-body">'
      + '<p class="rc-label">卡號</p>'
      + '<input class="rc-field" readonly value="' + esc(it.card) + '">'
      + '<p class="rc-label">密碼</p>'
      + '<input class="rc-field" readonly value="' + esc(it.pwd) + '">'
      + '<p class="rc-label">目前輸出</p>'
      + '<input class="rc-field" readonly value="' + esc(out) + '">'
      + '<div class="copy-btns">'
      + '<button class="cb cb-blue"  onclick="doCopy(this,\'' + esc(it.card) + '\')">複製卡號</button>'
      + '<button class="cb cb-light" onclick="doCopy(this,\'' + esc(it.pwd)  + '\')">複製密碼</button>'
      + '<button class="cb cb-gray"  onclick="doCopy(this,\'' + esc(out)     + '\')">複製本筆</button>'
      + '</div></div></div>';
  }).join('');
}

function esc(s){ return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function parse() {
  const raw = document.getElementById('sms-input').value.trim();
  if (!raw) return;
  items = splitMessages(raw).map(extract).filter(function(i){ return i.card || i.pwd; });
  updateOutput();
}

function loadExample() {
  document.getElementById('sms-input').value = EXAMPLE;
  parse();
}

function clearAll() {
  document.getElementById('sms-input').value = '';
  document.getElementById('all-preview').value = '';
  items = [];
  updateOutput();
}

async function pasteClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById('sms-input').value = text;
    parse();
  } catch(e) { alert('請手動貼上，或允許剪貼簿存取權限。'); }
}

function doCopy(btn, text) {
  navigator.clipboard.writeText(text).then(function() {
    const orig = btn.textContent;
    btn.textContent = '✓ 已複製';
    btn.classList.add('copied-state');
    setTimeout(function(){ btn.textContent = orig; btn.classList.remove('copied-state'); }, 1600);
  });
}

function copyAll(btn) {
  const val = document.getElementById('all-preview').value;
  if (val) doCopy(btn, val);
}

function copyFirst(btn) {
  if (items.length) doCopy(btn, getFormat(items[0]));
}

function downloadTxt() {
  const val = document.getElementById('all-preview').value;
  if (!val) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([val], {type:'text/plain'}));
  a.download = 'mycard_output.txt';
  a.click();
}
</script>
</body>
</html>
